# air live-reload config for the dev container (Dockerfile.dev).
# Builds the HTTP server and restarts it whenever a .go file changes.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  delay = 500
  include_ext = ["go"]
  exclude_dir = ["tmp", "uploads", "web", "node_modules", "dist", ".git", ".devdata"]
  exclude_regex = ["_test\\.go"]
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
