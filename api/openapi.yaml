openapi: 3.0.3

info:
  title: Micro-Blog API
  version: 0.1.0
  description: |
    Authenticated markdown micro-blog with a built-in URL shortener.
    Dual-token JWT (15min access + 7d refresh-cookie); RBAC enforced by a
    centralized permission/scope matrix.

servers:
  - url: /
    description: Local dev (PORT from .env)

tags:
  - name: public
    description: Read-only / unauthenticated endpoints.
  - name: auth
    description: Register / login / refresh / logout.
  - name: profile
    description: Self-service /api/me (any authenticated role).
  - name: posts
    description: Post CRUD; bouncer-gated by post permissions.
  - name: shortlinks
    description: URL shortener; public hashid resolution + authenticated CRUD.
  - name: categories
    description: Public read-only list; Admin/Editor writes under /admin/categories.
  - name: tags
    description: Public read-only list; Admin/Editor writes under /admin/tags.
  - name: admin-users
    description: Admin-only user management.
  - name: docs
    description: OpenAPI spec and Swagger UI.

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Paste the `access_token` returned by `POST /auth/login` (no `Bearer `
        prefix — Swagger UI adds it). After Authorize, the page re-fetches the
        spec so the role-filtered operation list updates.
    RefreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: |
        HttpOnly cookie set by `POST /auth/login`; JavaScript cannot read it
        and you cannot paste it into Authorize here. The browser sends it
        automatically on `/auth/refresh` and `/auth/logout`. Leave this field
        blank in the Authorize dialog.

  parameters:
    PathID:
      name: id
      in: path
      required: true
      description: Numeric primary key.
      schema:
        type: integer
        format: int64
        minimum: 1
    PathCode:
      name: code
      in: path
      required: true
      description: Hashid (≥6-char opaque string) encoding the row's numeric id.
      schema:
        type: string
        minLength: 1
    PathSlug:
      name: slug
      in: path
      required: true
      description: |
        URL-safe slug auto-generated from the post title via internal/slug
        (Bulgarian Cyrillic input is transliterated per the 2009 law).
      schema:
        type: string
        minLength: 1
    QueryPage:
      name: page
      in: query
      required: false
      description: 1-indexed page number. Defaults to 1.
      schema:
        type: integer
        minimum: 1
        default: 1
    QueryPerPage:
      name: per_page
      in: query
      required: false
      description: |
        Rows per page. Defaults to 50; values above 200 are clamped to 200.
        Non-numeric or non-positive values return 400 `invalid_pagination`.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid_input
          description: Machine-readable error code.
        message:
          type: string
          example: validation failed
          description: Human-readable detail (optional).
        fields:
          type: object
          additionalProperties:
            type: string
          example:
            username: must be at least 3 characters
            email: is not a valid email
          description: |
            Per-field validation messages, present only on `invalid_input`
            responses where one or more fields failed validation. Each value
            is a single human-readable message for that field.

    User:
      type: object
      required: [id, username, email, role_id, role]
      properties:
        id: { type: integer, format: int64, example: 1 }
        username: { type: string, example: alice }
        email: { type: string, format: email, example: alice@example.com }
        role_id: { type: integer, format: int64, example: 3 }
        role: { type: string, example: Author }

    Post:
      type: object
      required: [id, author_id, author_name, category_id, category_name, title, slug, markdown_content, excerpt, html_content, created_at, tags, status]
      properties:
        id: { type: integer, format: int64, example: 42 }
        code:
          type: string
          example: X7bL9q
          description: Hashid of `id`; present on response, never sent on requests.
        author_id: { type: integer, format: int64, example: 7 }
        author_name:
          type: string
          example: alice
          description: |
            Username of the row referenced by `author_id`.
        category_id: { type: integer, format: int64, example: 2 }
        category_name:
          type: string
          example: Engineering
          description: |
            Name of the row referenced by `category_id`.
        title: { type: string, example: "Hello world" }
        status:
          type: string
          enum: [draft, published, archived]
          example: published
          description: |
            Visibility state of the post
              - `draft` - only the author and Admin/Editor see it in `/admin/*` lists. Default on create.
              - `published` - visible on public `GET /posts`, `GET /posts/{slug}` and `GET /p/{code}`.'
              - `archived` - visible only on `/admin/*`; equivalent to "unpublished".
        slug:
          type: string
          example: hello-world
          description: |
            Auto-generated by the server from `title` via the Bulgarian
            transliteration rules in internal/slug. Unique across posts —
            collisions are resolved by appending -2, -3, …
        markdown_content: { type: string, example: "# Hello\n\nworld" }
        excerpt: { type: string, description: "Markdown content stripped and limited to 100 characters", example: "Hello\n\nworld" }
        html_content: { type: string, example: "<h1>Hello</h1>\n<p>world</p>\n" }
        created_at: { type: string, format: date-time }
        tags:
          type: object
          additionalProperties: { type: string }
          example: { "3": "go", "5": "web" }
          description: |
            Tags attached to the post, keyed by numeric tag id (rendered as a
            JSON string key per the spec). Empty object when the post has no
            attached tags.
        featured_image_path:
          type: string
          example: "2026/02/03/my-photo.jpg"
          description: |
            Relative path of the **original** uploaded featured image, served
            at `GET /uploads/{featured_image_path}`. Omitted (or empty) when
            the post has no featured image.

            Three variants are also written to disk by an async worker:

              small  (200×200, centered square)   suffix `-s`
              medium (360×360, centered square)   suffix `-m`
              large  (800×800, centered square)   suffix `-l`

            Client constructs the variant URL by inserting the size suffix
            before the file extension. Example for path
            `2026/02/03/my-photo.jpg`:

              small  → /uploads/2026/02/03/my-photo-s.jpg
              medium → /uploads/2026/02/03/my-photo-m.jpg
              large  → /uploads/2026/02/03/my-photo-l.jpg

            Variants may 404 briefly after the upload until the worker has
            generated them — clients fall back to the original via `onError`.

    PostWriteRequest:
      type: object
      required: [title, markdown_content, category_id]
      description: |
        JSON-encoded payload sent as the `data` form field of a multipart
        POST/PUT to `/admin/posts` (see those operations for the multipart
        envelope).
      properties:
        title: { type: string, minLength: 3, maxLength: 200, example: "Hello world" }
        status:
          type: string
          enum: [draft, published, archived]
          example: published
          description: |
            Optional.
              - On POST: omitting defaults to `draft`.
              - On PUT: omitting preserves the post's existing status. Any explicit value must be one of the enum value members or the request 404s.
        markdown_content: { type: string, minLength: 10, example: "# Hello\n\nworld" }
        category_id: { type: integer, format: int64, minimum: 1, example: 1 }
        tag_ids:
          type: array
          items: { type: integer, format: int64 }
          example: [3, 5]
          description: Optional. Tag ids to attach to the post.
        remove_featured_image:
          type: boolean
          default: false
          description: |
            PUT only. When true (and no `featured_image` file part is sent),
            wipes the existing featured image from disk and nulls the column.

    Category:
      type: object
      required: [id, name, slug, created_at]
      properties:
        id: { type: integer, format: int64, example: 2 }
        name: { type: string, example: Engineering }
        slug: { type: string, example: engineering, description: URL-safe slug, Unique accross tags. }
        created_at: { type: string, format: date-time }

    Tag:
      type: object
      required: [id, name, created_at]
      properties:
        id: { type: integer, format: int64, example: 3 }
        name: { type: string, example: go }
        created_at: { type: string, format: date-time }

    ShortLink:
      type: object
      required: [id, user_id, original_url, created_at]
      properties:
        id: { type: integer, format: int64, example: 8 }
        code:
          type: string
          example: X7bL9q
          description: Hashid of `id`; share `https://host/s/{code}` to redirect.
        user_id: { type: integer, format: int64, example: 7 }
        original_url: { type: string, format: uri, example: "https://example.com/page" }
        created_at: { type: string, format: date-time }

    PageMeta:
      type: object
      required: [page, per_page, total]
      description: Wrapper for all paginated list responses.
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        per_page:
          type: integer
          minimum: 1
          maximum: 200
          example: 50
        total:
          type: integer
          minimum: 0
          description: Total number of rows that match the filter (not just this page).
          example: 137

    PaginatedUsers:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/User' }
    PaginatedPosts:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Post' }
    PaginatedShortLinks:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/ShortLink' }
    PaginatedCategories:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Category' }
    PaginatedTags:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Tag' }

    PostsByCategoryResponse:
      type: object
      required: [category, items, page, per_page, total]
      description: |
        Paginated posts in a category, wrapped with the parent category's
        identity so the UI doesn't need a second call to render "Posts in <Category>".
      properties:
        category: { $ref: '#/components/schemas/Category' }
        items:
          type: array
          items: { $ref: '#/components/schemas/Post' }
        page:     { type: integer, minimum: 1, example: 1 }
        per_page: { type: integer, minimum: 1, maximum: 200, example: 50 }
        total:    { type: integer, minimum: 0, example: 137 }

    PostsByTagResponse:
      type: object
      required: [tag, items, page, per_page, total]
      description: Same shape as PostsByCategoryResponse with the tag pivot.
      properties:
        tag: { $ref: '#/components/schemas/Tag' }
        items:
          type: array
          items: { $ref: '#/components/schemas/Post' }
        page:     { type: integer, minimum: 1, example: 1 }
        per_page: { type: integer, minimum: 1, maximum: 200, example: 50 }
        total:    { type: integer, minimum: 0, example: 42 }

    TokenResponse:
      type: object
      required: [access_token, user]
      properties:
        access_token:
          type: string
          description: 'JWT access token; pass as `Authorization: Bearer <token>`.'
        user: { $ref: '#/components/schemas/User' }

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string, example: alice }
        email: { type: string, format: email, example: alice@example.com }
        password: { type: string, format: password, minLength: 8, example: hunter2hunter2 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    CategoryWriteRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Engineering
          description: 1–50 characters after trimming. Must be unique.
        slug:
          type: string
          example: engineering
          description: |
            Optional. Kebab-case ASCII, 1–100 chars (`[a-z0-9]+(-[a-z0-9]+)*`).
            On create: omitted ⇒ auto-generated from `name` via internal/slug
            with automatic `-2`/`-3`/… suffixing on collision. Supplied ⇒ persisted as-is;
            UNIQUE-violation returns 409 `slug_conflict`.
            On update: omitted ⇒ existing slug preserved. Supplied ⇒ same policy as on create.

    TagWriteRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: go
          description: 1–50 characters after trimming. Must be unique.
        slug:
          type: string
          example: go
          description: Same auto-generate / explicit-collision policy as CategoryWriteRequest.slug.

    ShortLinkWriteRequest:
      type: object
      required: [original_url]
      properties:
        original_url:
          type: string
          format: uri
          example: "https://example.com/page"
          description: Must use http or https and include a host.

    UserCreateRequest:
      type: object
      required: [username, email, password, role_id]
      properties:
        username: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        role_id:
          type: integer
          format: int64
          enum: [1, 2, 3, 4]
          description: 1=Admin, 2=Editor, 3=Author, 4=Subscriber

    UserUpdateRequest:
      type: object
      description: Partial update; any omitted field stays unchanged.
      properties:
        username: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        role_id:
          type: integer
          format: int64
          enum: [1, 2, 3, 4]

    MeUpdateRequest:
      type: object
      description: |
        Partial profile update. `role_id` is intentionally **not** a property —
        even if a client sends it the server ignores it (no privilege escalation
        via /api/me).
      properties:
        username: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }

  responses:
    BadRequest:
      description: Bad request — invalid body or input.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Authentication required or token invalid/expired.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated but not permitted.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Uniqueness constraint violation (username/email).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

paths:
  /:
    get:
      tags: [public]
      operationId: home
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: Service liveness ping.
      security: []
      responses:
        '200':
          description: Empty JSON object.
          content:
            application/json:
              schema: { type: object }

  /posts:
    get:
      tags: [public, posts]
      operationId: listPostsPublic
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: List published posts (public).
      security: []
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
      responses:
        '200':
          description: Paginated posts, each carrying a hashid `code`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedPosts' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /posts/{slug}:
    get:
      tags: [public, posts]
      operationId: getPostBySlug
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: Read a single post by its slug.
      description: |
        Slugs are auto-generated from the title and stable for the life of
        the post (unless the title changes, in which case a new slug is
        derived and the old one stops resolving).
      security: []
      parameters:
        - $ref: '#/components/parameters/PathSlug'
      responses:
        '200':
          description: The post.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Post' }
        '404': { $ref: '#/components/responses/NotFound' }

  /p/{code}:
    get:
      tags: [public, posts]
      operationId: getPostByCode
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: Read a single post by its hashid.
      description: |
        Alternate by-id-style read for callers that already hold a hashid
        (e.g., from a previous list response's `code` field). Numeric ids
        are rejected — use `/admin/post/{id}` (Admin role required) for that.
      security: []
      parameters:
        - $ref: '#/components/parameters/PathCode'
      responses:
        '200':
          description: The post.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Post' }
        '404': { $ref: '#/components/responses/NotFound' }

  /categories:
    get:
      tags: [public, categories]
      operationId: listCategoriesPublic
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: List all categories (public).
      security: []
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
      responses:
        '200':
          description: Paginated categories.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedCategories' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /categories/{slug}:
    get:
      tags: [public, categories, posts]
      operationId: listPostsByCategorySlug
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: List published posts in a category (public, paginated).
      description: |
        Looks up the category by its URL-safe slug, then returns the page of posts attached to it filtered to `status='published'`.
        Unknown slug returns 404.
        Response wraps the post list with the parent category's identity so a single round-trip renders the "Posts in <Category>" view.
      security: []
      parameters:
        - $ref: '#/components/parameters/PathSlug'
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
      responses:
        '200':
          description: Paginated posts in this category.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PostsByCategoryResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /tags:
    get:
      tags: [public, tags]
      operationId: listTagsPublic
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: List all tags (public).
      security: []
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
      responses:
        '200':
          description: Paginated tags.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedTags' }
        '400': { $ref: '#/components/responses/BadRequest' }
    
  /tags/{slug}:
    get:
      tags: [public, tags, posts]
      operationId: listPostsByTagSlug
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: List published posts tagged with this slug (public, paginated).
      description: |
        Same shape as `GET /categories/{slug}` with the tag pivot. Only `status='published'` posts are returned. Unknown slug ⇒ 404.
      security: []
      parameters:
        - $ref: '#/components/parameters/PathSlug'
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
      responses:
        '200':
          description: Paginated posts tagged with this slug.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PostsByTagResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /s/{code}:
    get:
      tags: [public, shortlinks]
      operationId: resolveShortLink
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: Decode a hashid and resolve to the stored URL.
      description: |
        Same-origin targets (target host matches the requests "Host" header) 302 redirect directly.
        External targets render an HTML state template page that surfaces the destination host before the user clicks through.
      security: []
      parameters:
        - $ref: '#/components/parameters/PathCode'
      responses:
        '200':
          description: |
            HTML state template page warning the user about an external host.
            Returned when the target host differs from the request host.
          content:
            text/html:
              schema: {type: string}
        '302':
          description: Redirect to the original URL. Returned only when the target host mathes the request host (same-origin).
          headers:
            Location:
              description: Original URL stored against this code.
              schema: { type: string, format: uri }
        '404': { $ref: '#/components/responses/NotFound' }

  /openapi.yaml:
    get:
      tags: [docs]
      operationId: getOpenAPIYAML
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: This OpenAPI spec, in YAML.
      security: []
      responses:
        '200':
          description: Raw YAML.
          content:
            application/yaml:
              schema: { type: string }

  /openapi.json:
    get:
      tags: [docs]
      operationId: getOpenAPIJSON
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: This OpenAPI spec, in JSON.
      security: []
      responses:
        '200':
          description: Spec as JSON.
          content:
            application/json:
              schema: { type: object }

  /docs:
    get:
      tags: [docs]
      operationId: getDocsUI
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: Swagger UI rendering /openapi.json.
      security: []
      responses:
        '200':
          description: HTML page.
          content:
            text/html: { schema: { type: string } }

  /auth/register:
    post:
      tags: [auth]
      operationId: register
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: Create a new account (defaults to Subscriber role).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /auth/login:
    post:
      tags: [auth]
      operationId: login
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: Exchange credentials for an access token + refresh cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Access token in body; refresh token set as HttpOnly cookie.
          headers:
            Set-Cookie:
              description: |
                `refresh_token=<opaque>; HttpOnly; Path=/auth; SameSite=Strict;
                Max-Age=<JWT_REFRESH_TTL>` (Secure when COOKIE_SECURE=true).
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      tags: [auth]
      operationId: refresh
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: Rotate the refresh cookie and issue a new access token.
      description: |
        Reads the refresh_token cookie, deletes the old row server-side,
        inserts a new one, and sets a fresh cookie. Replaying the previous
        cookie returns 401.
      security:
        - RefreshCookie: []
      responses:
        '200':
          description: New access token; new refresh cookie set.
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [auth]
      operationId: logout
      x-roles: [anonymous, Subscriber, Author, Editor, Admin]
      summary: Revoke the refresh token and (optionally) the access_token.
      security:
        - RefreshCookie: []
        - BearerAuth: []
      responses:
        '204':
          description: |
            Cookie cleared; refresh row removed if present;
            access JWT revoked if a valid Bearer token was supplied.
          headers:
            Set-Cookie:
              schema: { type: string }

  /api/me:
    get:
      tags: [profile]
      operationId: getMe
      x-roles: [Subscriber, Author, Editor, Admin]
      summary: Read the authenticated user's profile.
      responses:
        '200':
          description: The caller's user row.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [profile]
      operationId: updateMe
      x-roles: [Subscriber, Author, Editor, Admin]
