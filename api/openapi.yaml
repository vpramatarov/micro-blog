        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/posts:
    get:
      tags: [posts]
      operationId: listPostsAdmin
      x-roles: [Subscriber, Author, Editor, Admin]
      summary: Authenticated list — Authors see only own posts; others see all.
      parameters:
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, published, archived]
            description: |
              Optional filter. When omitted, all statuses are returned. Returns 404 when the value is outside the enum.
      responses:
        '200':
          description: Paginated posts.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedPosts' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [posts]
      operationId: createPost
      x-roles: [Author, Editor, Admin]
      summary: Create a post. Admin / Editor / Author allowed; Subscriber denied.
      description: |
        Accepts `multipart/form-data` only. The post body itself goes into a
        `data` form field as a JSON string (see the `PostWriteRequest`
        schema). An optional `featured_image` file part attaches a JPEG or
        PNG (≤5 MB, min 800×800).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: string
                  description: JSON-encoded `PostWriteRequest`.
                featured_image:
                  type: string
                  format: binary
                  description: |
                    Optional. JPEG or PNG, ≤5 MB, min 800×800. Saved to disk
                    under `./uploads/YYYY/MM/DD/<name>.<ext>`. Three centered-
                    square variants (200/360/800) are generated by a
                    background worker.
      responses:
        '201':
          description: Created post; `html_content` rendered from markdown.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Post' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '413':
          description: Multipart body exceeds the 5 MB cap.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '415':
          description: Uploaded image is neither JPEG nor PNG.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/posts/{id}:
    put:
      tags: [posts]
      operationId: updatePost
      x-roles: [Author, Editor, Admin]
      summary: Edit a post.
      description: |
        Admin / Editor edit any; Author edits own only. Same multipart envelope
        as `POST /admin/posts`. Image semantics:

          * `featured_image` part present                → REPLACE old image
          * `data.remove_featured_image` is true         → DELETE old image
          * neither                                      → KEEP old image
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: string
                  description: JSON-encoded `PostWriteRequest`.
                featured_image:
                  type: string
                  format: binary
                  description: Optional. Same constraints as create.
      responses:
        '200':
          description: Updated post.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Post' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: Multipart body exceeds the 5 MB cap.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '415':
          description: Uploaded image is neither JPEG nor PNG.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [posts]
      operationId: deletePost
      x-roles: [Author, Editor, Admin]
      summary: Delete a post.
      description: Admin / Editor delete any; Author deletes own only.
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/post/{id}:
    get:
      tags: [posts]
      operationId: getPostByIDAdmin
      x-roles: [Admin]
      summary: Read a post by numeric id. Admin role only.
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: The post.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Post' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/categories/{slug}:
    get:
      tags: [categories, posts]
      operationId: listPostsByCategorySlugAdmin
      x-roles: [Subscriber, Author, Editor, Admin]
      summary: Authenticated list of posts in a category — Authors see only own posts.
      description: |
        Same wrapper shape as `GET /categories/{slug}` plus the `?status=` enum
        filter from `GET /admin/posts`. The Author role is filtered to its own
        posts via `claims.UserID` (closed-loop, never trusted from input).
      parameters:
        - $ref: '#/components/parameters/PathSlug'
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, published, hidden]
          description: |
            Optional filter. When omitted, all statuses are returned.
            Returns 400 when the value is outside the enum.
      responses:
        '200':
          description: Paginated posts in this category (role-filtered).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PostsByCategoryResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/tags/{slug}:
    get:
      tags: [tags, posts]
      operationId: listPostsByTagSlugAdmin
      x-roles: [Subscriber, Author, Editor, Admin]
      summary: Authenticated list of posts tagged with this slug — Authors see only own posts.
      parameters:
        - $ref: '#/components/parameters/PathSlug'
        - $ref: '#/components/parameters/QueryPage'
        - $ref: '#/components/parameters/QueryPerPage'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [draft, published, hidden]
      responses:
        '200':
          description: Paginated posts with this tag (role-filtered).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PostsByTagResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/categories:
    post:
      tags: [categories]
      operationId: createCategory
      x-roles: [Admin, Editor]
      summary: Create a category. Admin or Editor only.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryWriteRequest' }
      responses:
        '201':
          description: Created category.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/categories/{id}:
    put:
      tags: [categories]
      operationId: updateCategory
      x-roles: [Admin, Editor]
      summary: Rename a category.
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryWriteRequest' }
      responses:
        '200':
          description: Updated category.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [categories]
      operationId: deleteCategory
      x-roles: [Admin, Editor]
      summary: Delete a category.
      description: |
        Fails with 409 `category_in_use` when any post still references the
        row. Reassign or delete those posts first.
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Category still has posts attached.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/tags:
    post:
      tags: [tags]
      operationId: createTag
      x-roles: [Admin, Editor]
      summary: Create a tag. Admin or Editor only.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TagWriteRequest' }
      responses:
        '201':
          description: Created tag.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tag' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/tags/{id}:
    put:
      tags: [tags]
      operationId: updateTag
      x-roles: [Admin, Editor]
      summary: Rename a tag.
      parameters:
        - $ref: '#/components/parameters/PathID'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TagWriteRequest' }
      responses:
        '200':
          description: Updated tag.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tag' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
