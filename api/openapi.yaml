      tags: [admin-users]
      operationId: getUser
      x-roles: [Admin]
      summary: Read a user. Admin only.
      parameters:
        - $ref: '#/components/parameters/PathID'
      responses:
        '200':
          description: The user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
